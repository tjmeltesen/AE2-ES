# AE2-ES Nightly Soak & Performance Pipeline
# Tier 2: Full integration + soak + performance profiling
# Scheduled nightly at 3am UTC, plus manual trigger

name: Nightly Soak

on:
  schedule:
    - cron: "0 3 * * *"  # 3am UTC daily
  workflow_dispatch:       # manual trigger

jobs:
  tier2-integration:
    name: "Tier 2 — Full Integration + Soak + Performance"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Full test suite (unit + integration + soak + performance)
        run: python run_tests.py

      - name: Dashboard tests
        run: python run_dashboard_tests.py

  # GC memory leak detection — soak with 5x repetition
  tier2-soak-repeat:
    name: "Tier 2 — Repeated Soak (5x cycles, memory leak detection)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run soak test with 5x repetition
        run: |
          python -c "
          import subprocess, sys
          for i in range(5):
              print(f'--- Soak cycle {i+1}/5 ---')
              r = subprocess.run([sys.executable, 'run_tests.py'], capture_output=True, text=True)
              print(r.stdout[-500:])
              if r.returncode != 0:
                  print(f'FAILED on cycle {i+1}')
                  sys.exit(1)
          print('All 5 soak cycles passed — no memory leak detected')
          "

  notify-failure:
    name: "Notify on failure"
    needs: [tier2-integration, tier2-soak-repeat]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Log failure
        run: |
          echo "Nightly soak failure detected. Check workflow logs."
