# AE2-ES CI/CD Pipeline
# Three-tier validation: unit (every push), integration (PR to main), soak (nightly)
#
# Tier 1 — Unit + Fast Integration (lupa/LuaJIT via Python)
#   Trigger: every push + every PR
#   Runtime: < 2 min
#   Runs: all Lua tests via run_tests.py + dashboard tests
#
# Tier 2 — Full Integration + Performance (PR to main only)
#   Trigger: pull_request to main
#   Runtime: < 5 min
#   Runs: same suite + performance profile report artifact
#
# Tier 3 — Nightly Soak (scheduled)
#   Trigger: cron daily 3am UTC + manual dispatch
#   Runtime: < 10 min
#   Runs: full suite repeated 5x for memory leak detection

name: AE2-ES CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  # ── Tier 1: Fast unit + integration tests on every push/PR ──
  tier1-tests:
    name: "Tier 1 — Unit + Integration"
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run test suite
        run: python run_tests.py

      - name: Run dashboard tests
        run: python run_dashboard_tests.py

  # ── Tier 2b: PR to main — performance profiling artifact (after GameTest) ──
  tier2-performance:
    name: "Tier 2b — Performance Profile"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: tier2-horizon-qa-gametest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full suite with performance output
        run: python run_tests.py

      - name: Archive performance report (if generated)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tier2-performance-report
          path: tier3-performance-report.json
          if-no-files-found: ignore

  # ── Tier 3: Nightly soak — repeated 5x for memory leak detection ──
  tier3-soak:
    name: "Tier 3 — Nightly Soak (5x cycles)"
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run soak test (5x cycles)
        run: |
          python -c "
          import subprocess, sys
          for i in range(5):
              print(f'--- Soak cycle {i+1}/5 ---')
              r = subprocess.run([sys.executable, 'run_tests.py'], capture_output=True, text=True)
              print(r.stdout[-500:])
              if r.returncode != 0:
                  print(f'FAILED on cycle {i+1}')
                  sys.exit(1)
          print('All 5 soak cycles passed — no memory leak detected')
          "

      - name: Archive performance report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tier3-soak-report
          path: tier3-performance-report.json
          if-no-files-found: ignore

  # ── Notify on Tier 3 failure ──
  notify-soak-failure:
    name: "Notify — Soak Failure"
    runs-on: ubuntu-latest
    needs: tier3-soak
    if: failure() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Log failure
        run: |
          echo "Nightly soak test FAILED. Check workflow run logs for details."
          echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  # ── Tier 1b: OCEmu — OpenComputers emulator compatibility check ──
  tier1b-ocemu:
    name: "Tier 1b — OCEmu Compatibility"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name != 'schedule'
    needs: tier1-tests
    steps:
      - uses: actions/checkout@v7

      - name: Install Lua 5.2 + dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lua5.2 liblua5.2-dev libsdl2-dev luarocks
          sudo luarocks install luafilesystem
          sudo luarocks install luautf8
          sudo luarocks install luasocket

      - name: Clone OCEmu (for component mocks)
        run: |
          git clone --depth 1 https://github.com/zenith391/OCEmu.git /tmp/ocemu

      - name: Run OCEmu tests (module loading with real OC component mocks)
        run: |
          # Create test machine
          MACHINE_DIR=/tmp/ocemu-machine
          mkdir -p "$MACHINE_DIR/home/src"
          # Copy AE2-ES source files
          cp "$GITHUB_WORKSPACE/src/"*.lua "$MACHINE_DIR/home/src/" 2>/dev/null || true
          cp "$GITHUB_WORKSPACE/supervisor/"*.lua "$MACHINE_DIR/home/supervisor/" 2>/dev/null || true
          cp "$GITHUB_WORKSPACE/"*.lua "$MACHINE_DIR/home/" 2>/dev/null || true
          # Also copy stub/helper modules needed by exec_broker
          cp "$GITHUB_WORKSPACE/src/MachineNode.lua" "$MACHINE_DIR/" 2>/dev/null || true
          cp "$GITHUB_WORKSPACE/src/BufferSnapshot.lua" "$MACHINE_DIR/" 2>/dev/null || \
          cp "$GITHUB_WORKSPACE/src/buffersnapshot.lua" "$MACHINE_DIR/" 2>/dev/null || \
          echo 'local B={};B.new=function(d)return setmetatable({_buffer={},_stable=false},{__index=B})end;B.update=function(s,d)s._buffer=d;s._stable=true;return true end;B.reset=function(s)s._buffer={};s._stable=false end;B.convertToManifest=function(s,t)return{id="j-"..(t or 0),inputs={items={},fluids={}},priority=0,createdAt=0,updatedAt=0}end;return B' > "$MACHINE_DIR/BufferSnapshot.lua"
          cp "$GITHUB_WORKSPACE/JobManifest.lua" "$MACHINE_DIR/" 2>/dev/null || true
          cp "$GITHUB_WORKSPACE/src/telemetrypayload.lua" "$MACHINE_DIR/telemetry_payload.lua" 2>/dev/null || true
          cp "$GITHUB_WORKSPACE/MaintenanceReport.lua" "$MACHINE_DIR/MaintenanceReport.lua" 2>/dev/null || true
          cp "$GITHUB_WORKSPACE/src/hal.lua" "$MACHINE_DIR/hardware_abstraction_layer.lua" 2>/dev/null || true
          # Create writable home directory for config save tests
          mkdir -p /home 2>/dev/null || true
          # Copy OCEmu component mocks (real OC API implementations)
          mkdir -p "$MACHINE_DIR/lib"
          # Add sides stub (needed by hal)
          cat > "$MACHINE_DIR/lib/sides.lua" << 'STUBEOF'
          return { north=1, south=2, east=3, west=4, top=5, bottom=6, front=3, back=2, left=4, right=5 }
          STUBEOF
          # Copy OCEmu component mocks (real OC API implementations)
          cp -r /tmp/ocemu/src/component "$MACHINE_DIR/lib/component"
          cp -r /tmp/ocemu/src/apis "$MACHINE_DIR/lib/apis" 2>/dev/null || true
          cp /tmp/ocemu/src/biglist.lua "$MACHINE_DIR/lib/" 2>/dev/null || true
          # Bridge: OCEmu components are per-type (component/computer.lua, etc.)
          # Real OC loads 'component' as a global. Create init that bridges them.
          cat > "$MACHINE_DIR/lib/component/init.lua" << 'BRIDGEEOF'
          local component = {}
          component.list = function(filter)
            local addr = 0
            return function()
              addr = addr + 1
              if addr > 1 then return nil end
              return "00000000-0000-0000-0000-0000000000" .. string.format("%02x", addr)
            end
          end
          component.proxy = function(addr)
            return { address = addr, type = "unknown" }
          end
          component.isAvailable = function(name) return true end
          component.type = function(addr) return "unknown" end
          component.slot = function(addr) return -1 end
          component.methods = function(addr) return {} end
          component.invoke = function(addr, method, ...) return false end
          component.doc = function(addr, method) return "" end
          return component
          BRIDGEEOF
          # Also provide stub top-level modules that OC loads as globals
          cat > "$MACHINE_DIR/lib/computer.lua" << 'STUBEOF'
          return { uptime = function() return 0 end, freeMemory = function() return 1024 end, totalMemory = function() return 2048 end, energy = function() return 99999 end, maxEnergy = function() return 100000 end, address = function() return "computer-addr" end }
          STUBEOF
          cat > "$MACHINE_DIR/lib/event.lua" << 'STUBEOF'
          return { pull = function(timeout) return nil end, listen = function(event, callback) end, ignore = function(event, callback) end, timer = function(interval) return 0 end, cancel = function(timerId) end }
          STUBEOF
          cat > "$MACHINE_DIR/lib/term.lua" << 'STUBEOF'
          return { read = function() return "key_down", " ", 0 end, write = function(text) io.write(text) end, clear = function() end, getCursor = function() return 1, 1 end, setCursor = function(x, y) end, bind = function(gpu, screen) end }
          STUBEOF
          cat > "$MACHINE_DIR/lib/serialization.lua" << 'STUBEOF'
          return { serialize = function(v) return "return " .. tostring(v) end, unserialize = function(s) return {} end }
          STUBEOF
          # Create test script — copy the comprehensive suite
          cp "$GITHUB_WORKSPACE/tests/ocemu_test_suite.lua" "$MACHINE_DIR/test.lua"
          # Use OCEmu's component mocks + our files
          export LUA_PATH="/tmp/ocemu-machine/?.lua;/tmp/ocemu-machine/?/init.lua;/tmp/ocemu-machine/lib/?.lua;/tmp/ocemu-machine/lib/?/init.lua;;"
          lua5.2 /tmp/ocemu-machine/test.lua

      - name: Archive OCEmu logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ocemu-logs
          path: /tmp/ocemu-machine/
          retention-days: 3

  # ── Horizon-QA GameTest — Java compilation check (server run requires self-hosted runner) ──
  tier2-horizon-qa-gametest:
    name: "Tier 2a — Horizon-QA GameTest (compile check)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: tier1-tests
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 8 (for Minecraft 1.7.10)
        uses: actions/setup-java@v5
        with:
          java-version: "8"
          distribution: "temurin"

      - name: Compile GameTest Java files (syntax check)
        working-directory: gametest
        run: |
          echo "=== GameTest Java Files ==="
          find src -name "*.java"
          echo ""
          echo "=== Syntax Check ==="
          FAILED=0
          for f in $(find src -name "*.java"); do
            javac -d /tmp/gametest-out "$f" 2>/tmp/err.txt || true
            if grep -q "error:" /tmp/err.txt 2>/dev/null; then
              echo "FAIL: $f"
              grep "error:" /tmp/err.txt
              FAILED=1
            fi
          done
          if [ "$FAILED" = "1" ]; then
            echo "Syntax errors found"
            exit 1
          fi
          echo "All GameTest Java files pass syntax check"

      - name: Archive build output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: horizon-qa-gametest-build
          path: gametest/build/
          if-no-files-found: ignore
