# AE2-ES CI/CD Pipeline
# Three-tier validation: unit (every push), integration (PR to main), soak (nightly)
#
# Tier 1 — Unit + Fast Integration (lupa/LuaJIT via Python)
#   Trigger: every push + every PR
#   Runtime: < 2 min
#   Runs: all Lua tests via run_tests.py + dashboard tests
#
# Tier 2 — Full Integration + Performance (PR to main only)
#   Trigger: pull_request to main
#   Runtime: < 5 min
#   Runs: same suite + performance profile report artifact
#
# Tier 3 — Nightly Soak (scheduled)
#   Trigger: cron daily 3am UTC + manual dispatch
#   Runtime: < 10 min
#   Runs: full suite repeated 5x for memory leak detection

name: AE2-ES CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  # ── Tier 1: Fast unit + integration tests on every push/PR ──
  tier1-tests:
    name: "Tier 1 — Unit + Integration"
    runs-on: ubuntu-latest
    # Skip on schedule events (handled by tier3)
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run test suite
        run: python run_tests.py

      - name: Run dashboard tests
        run: python run_dashboard_tests.py

  # ── Tier 2b: PR to main — performance profiling artifact (after GameTest) ──
  tier2-performance:
    name: "Tier 2b — Performance Profile"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: tier2-horizon-qa-gametest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full suite with performance output
        run: python run_tests.py

      - name: Archive performance report (if generated)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tier2-performance-report
          path: tier3-performance-report.json
          if-no-files-found: ignore

  # ── Tier 3: Nightly soak — repeated 5x for memory leak detection ──
  tier3-soak:
    name: "Tier 3 — Nightly Soak (5x cycles)"
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run soak test (5x cycles)
        run: |
          python -c "
          import subprocess, sys
          for i in range(5):
              print(f'--- Soak cycle {i+1}/5 ---')
              r = subprocess.run([sys.executable, 'run_tests.py'], capture_output=True, text=True)
              print(r.stdout[-500:])
              if r.returncode != 0:
                  print(f'FAILED on cycle {i+1}')
                  sys.exit(1)
          print('All 5 soak cycles passed — no memory leak detected')
          "

      - name: Archive performance report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tier3-soak-report
          path: tier3-performance-report.json
          if-no-files-found: ignore

  # ── Notify on Tier 3 failure ──
  notify-soak-failure:
    name: "Notify — Soak Failure"
    runs-on: ubuntu-latest
    needs: tier3-soak
    if: failure() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Log failure
        run: |
          echo "Nightly soak test FAILED. Check workflow run logs for details."
          echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  # ── Tier 1b: OCEmu — OpenComputers emulator compatibility check ──
  tier1b-ocemu:
    name: "Tier 1b — OCEmu Compatibility"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name != 'schedule'
    needs: tier1-tests
    steps:
      - uses: actions/checkout@v7

      - name: Install Lua 5.2 + dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lua5.2 liblua5.2-dev libsdl2-dev luarocks
          sudo luarocks install luafilesystem
          sudo luarocks install luautf8
          sudo luarocks install luasocket

      - name: Clone OCEmu
        run: |
          git clone --depth 1 https://github.com/zenith391/OCEmu.git /tmp/ocemu

      - name: Prepare OCEmu assets
        run: |
          mkdir -p /tmp/ocemu/src/assets/lua
          # OCEmu needs OC source files; fetch minimal set from OpenComputers repo
          cd /tmp
          git clone --depth 1 --filter=blob:none --sparse https://github.com/MightyPirates/OpenComputers.git oc-repo 2>/dev/null || true
          if [ -d oc-repo ]; then
            cd oc-repo
            git sparse-checkout set src/main/resources/assets/opencomputers/lua
            cp -r src/main/resources/assets/opencomputers/lua/* /tmp/ocemu/src/assets/lua/ 2>/dev/null || true
          fi
          # Create minimal component stubs if OC assets unavailable
          mkdir -p /tmp/ocemu/src/assets/lua/component
          echo 'return {}' > /tmp/ocemu/src/assets/lua/component.lua
          for comp in computer component event modem gpu screen term transposer filesystem; do
            echo "return {}" > "/tmp/ocemu/src/assets/lua/component/$comp.lua"
          done

      - name: Run OCEmu tests
        run: |
          chmod +x scripts/run_ocemu_tests.sh
          bash scripts/run_ocemu_tests.sh /tmp/ocemu "$GITHUB_WORKSPACE" /tmp/ocemu-machine

      - name: Archive OCEmu logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ocemu-logs
          path: /tmp/ocemu-machine/
          retention-days: 3

  # ── Horizon-QA GameTest — Java compilation check (server run requires self-hosted runner) ──
  tier2-horizon-qa-gametest:
    name: "Tier 2a — Horizon-QA GameTest (compile check)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: tier1-tests
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 8 (for Minecraft 1.7.10)
        uses: actions/setup-java@v5
        with:
          java-version: "8"
          distribution: "temurin"

      - name: Compile GameTest Java files (syntax check)
        working-directory: gametest
        run: |
          echo "=== GameTest Java Files ==="
          find src -name "*.java"
          echo ""
          echo "=== Syntax Check ==="
          FAILED=0
          for f in $(find src -name "*.java"); do
            javac -d /tmp/gametest-out "$f" 2>/tmp/err.txt || true
            if grep -q "error:" /tmp/err.txt 2>/dev/null; then
              echo "FAIL: $f"
              grep "error:" /tmp/err.txt
              FAILED=1
            fi
          done
          if [ "$FAILED" = "1" ]; then
            echo "Syntax errors found"
            exit 1
          fi
          echo "All GameTest Java files pass syntax check"

      - name: Archive build output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: horizon-qa-gametest-build
          path: gametest/build/
          if-no-files-found: ignore
